<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery slider</title>
    <style>
        .gallary-img{
            width: 600px;
            height: 500px;
            object-fit: cover;
            background-color: pink;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
        }
        .btn-container{
            position:relative;
            width:fit-content;
            display: block;
            margin: 10px auto;   
        }
        .btn{
            height: 60px;
            margin: 0 10px;
            cursor: pointer;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 200px;
        }
        .btn-left{
            left: -50px;
        }
        .btn-right{
            right: -50px;
        }
    </style>
</head>
<body>
    <div class="btn-container">
        <img src="./image1.webp" class="gallary-img" id="img">
        <img src="./left-arrow.svg" class="btn btn-left" onclick="prev()">
        <img src="./right-arrow.svg" class="btn btn-right" onclick="next()">
    </div>

    <script>    
        const imageArr = [
            "./image1.webp",
            "./image2.webp",
            "./image3.webp",
            "./image4.webp",
            "./image5.webp"
        ];
        let imgIndex = 0;

        const imgElement = document.getElementById("img");

        function prev(){
            if(imgIndex == 0){
                imgIndex = imageArr.length -1;
            }
            else{
                imgIndex--;
            }
            imgElement.src = imageArr[imgIndex];
        }
        function next(){
            if(imgIndex == imageArr.length - 1){
                imgIndex = 0;
            }
            else{
                imgIndex++;
            }
            imgElement.src = imageArr[imgIndex];   
        }
    
    </script>     
</body>
</html>
