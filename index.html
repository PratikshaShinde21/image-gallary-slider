<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery slider</title>
    <style>
        .gallary-img{
            width: 600px;
            height: 500px;
            object-fit: cover;
            background-color: pink;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
        }
        .btn-container{
            position:relative;
            width:fit-content;
            display: block;
            margin: 10px auto;   
        }
        .btn{
            height: 60px;
            margin: 0 10px;
            cursor: pointer;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 200px;
        }
        .btn-left{
            left: -50px;
        }
        .btn-right{
            right: -50px;
        }
    </style>
</head>
<body>
    <div class="btn-container">
        <img src="./image1.webp" class="gallary-img" id="img">
        <img src="./left-arrow.svg" class="btn btn-left" onclick="prev()">
        <img src="./right-arrow.svg" class="btn btn-right" onclick="next()">
    </div>

    
       
</body>
</html>
